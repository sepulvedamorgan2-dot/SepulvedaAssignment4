<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task List</title>

    <link rel="stylesheet" href="/src/css/styles.css">
    <link rel="stylesheet" href="/src/css/variables.css">
    <link rel="stylesheet" href="/src/css/headerhero.css">
    <link rel="stylesheet" href="/src/css/flex.css">
    <link rel="stylesheet" href="src/css/alert.css">
    <link rel="stylesheet" href="src/css/sidebar.css">
</head>

<body>
    <section id="alert" class="alertholder">
        <section class="alert">
            <h2 id="alertmessage">Task Saved</h2>
        </section>
    </section>
    <header class="header">
        <section>
            <img src="/src/images/task.jpg" alt="">
            <section>
                <h2>Task Manager</h2>
                <p>By: Morgan Sepulveda</p>
            </section>
            <div class="nav">
                <ul>
                    <li>Home</li>
                    <li id="alertCheck">Disable Alerts</li>
                    <li id="demoList">Demo List</li>
                </ul>
            </div>
        </section>
    </header>
    <section class="hero-image">
        <img src="/src/images/task.jpg" alt="">
    </section>

    <body>

        <article class="site-width">
            <section class="row" style="gap: 0;">
                <section class="sidebar" id="addtasksidebar">
                    <p><i class="bi bi-caret-right-fill"></i></p>
                    <p>Add Task</p>
                </section>
                <section class="row col-1" id="addtask">
                    <section class="col-1">
                        <div class="addtaskwidget">
                            <header class="headercolapse">
                                <p id="sidebaricon"><i class="bi bi-caret-left-fill"></i></p>
                                <p>Add A Task</p>
                            </header>
                            <form action="" id="addtaskform">
                                <label for="category">Task Category</label>
                                <select name="category" id="category">
                                    <option value="">Select</option>
                                    <option value="Chore">Chore</option>
                                    <option value="Mealprep">Meal Prep</option>
                                    <option value="Homework">Homework</option>
                                    <option value="Maintenance">Maintenance</option>
                                </select>
                                <label for="title">Task Title</label>
                                <input type="text" id="title">
                                <label for="description">Task Description</label>
                                <textarea name="title" id="description"></textarea>
                                <button type="submit">Submit</button>
                            </form>
                        </div>
                    </section>
                    <!-- <section class="col-1"></section> -->
                </section>
                <section class="col-3">
                    <div class="widget">
                        <header>
                            <p>Task List</p>
                        </header>
                        <form action="" id="filterform">
                            <section class="f">
                                <em>Filters:</em>
                            </section>
                            <section class="row f2">
                                <div class="filteroption">
                                    <select name="filtercategory" id="filtercategory">
                                        <option value="all">All Categories</option>
                                        <option value="Chore">Chore</option>
                                        <option value="Mealprep">Meal Prep</option>
                                        <option value="Homework">Homework</option>
                                        <option value="Maintenance">Maintenance</option>
                                    </select>
                                </div>
                                <div class="filteroption">

                                    <input type="text" id="filtertitle" placeholder="Filter by title">
                                </div>
                                <div class="filteroption">
                                    <select name="filtercompleted" id="filtercompleted">
                                        <option value="all">All</option>
                                        <option value="false">Not Completed</option>
                                        <option value="true">Completed</option>
                                    </select>
                                </div>
                                <div class="filteroption"></div>
                            </section>
                            <section class="row-label">
                                <div class="label">

                                    <p class="one">Task Title</p>
                                    <p class="two">Task Category</p>
                                    <p class="three">Done/Delete</p>
                                </div>
                            </section>
                            <section id="outputarea">

                            </section>
                        </form>
                    </div>
                </section>
            </section>
        </article>
    </body>
    <footer>

    </footer>

    <script type="module" src="/src/js/index.js"></script>
    <script type="module" src="/src/js/alert.js"></script>
    <script type="module" src="/src/js/localstorage.js"></script>
    <script src="/src/js/sidebar.js"></script>
</body>

</html>
